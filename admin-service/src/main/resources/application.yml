server:
  port: 8082

spring:
  application:
    name: admin-service
  datasource:
    url: jdbc:h2:mem:admindb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://admin:admin123@localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: music-library-secret-key-that-is-long-enough-for-hs256-algorithm
  expiration: 86400000

notification:
  service:
    url: http://notification-service

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
