<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhythmix — Music Library</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3e;
    --accent: #7c6af7;
    --accent2: #f06292;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --success: #4caf7d;
    --danger: #f06060;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* ─── Auth Screen ─────────────────────────────────────────────── */
  #auth-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background: radial-gradient(ellipse at 30% 50%, rgba(124,106,247,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(240,98,146,0.10) 0%, transparent 50%),
                var(--bg);
  }
  .auth-box {
    width: 420px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 40px; position: relative; overflow: hidden;
  }
  .auth-box::before {
    content: ''; position: absolute; top: -1px; left: 20%; right: 20%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
  }
  .brand { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 3px;
           background: linear-gradient(135deg, var(--accent), var(--accent2));
           -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
  .brand-sub { color: var(--muted); font-size: 13px; margin-bottom: 32px; letter-spacing: 1px; text-transform: uppercase; }
  .tab-row { display: flex; gap: 4px; margin-bottom: 28px; background: var(--card); padding: 4px; border-radius: 10px; }
  .tab-btn { flex: 1; padding: 9px; border: none; background: transparent; color: var(--muted);
             border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; transition: all .2s; }
  .tab-btn.active { background: var(--accent); color: #fff; }
  label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; display: block; margin-bottom: 6px; }
  input[type=text], input[type=email], input[type=password], input[type=date], select, textarea {
    width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 11px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
    outline: none; transition: border-color .2s; margin-bottom: 16px;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  .btn { width: 100%; padding: 13px; border: none; border-radius: 10px; cursor: pointer;
         font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; transition: all .2s; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), #9c6af7); color: #fff; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(124,106,247,.4); }
  .btn-sm { width: auto; padding: 7px 14px; font-size: 13px; border-radius: 8px; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .error-msg { color: var(--danger); font-size: 13px; margin-top: -10px; margin-bottom: 12px; }
  .form-group { margin-bottom: 0; }

  /* ─── Main App ────────────────────────────────────────────────── */
  #app { display: none; }
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: 230px;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 24px 16px; z-index: 10;
  }
  .sidebar-brand { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px;
                   background: linear-gradient(135deg, var(--accent), var(--accent2));
                   -webkit-background-clip: text; -webkit-text-fill-color: transparent;
                   margin-bottom: 32px; padding: 0 8px; }
  .nav-item {
    display: flex; align-items: center; gap: 12px; padding: 11px 12px; border-radius: 10px;
    cursor: pointer; color: var(--muted); font-size: 14px; font-weight: 500;
    transition: all .2s; margin-bottom: 4px; border: none; background: transparent; width: 100%; text-align: left;
  }
  .nav-item:hover { background: var(--card); color: var(--text); }
  .nav-item.active { background: rgba(124,106,247,.15); color: var(--accent); }
  .nav-item .icon { font-size: 18px; width: 22px; text-align: center; }
  .nav-spacer { flex: 1; }
  .user-chip { display: flex; align-items: center; gap: 10px; padding: 10px 12px;
               background: var(--card); border-radius: 10px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: #fff; flex-shrink: 0; }
  .user-name { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .logout-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; }
  .logout-btn:hover { color: var(--danger); }

  .main { margin-left: 230px; padding: 36px; min-height: 100vh; }
  .page { display: none; }
  .page.active { display: block; }
  .page-title { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; margin-bottom: 8px; }
  .page-sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

  /* Search bar */
  .search-row { display: flex; gap: 12px; margin-bottom: 28px; }
  .search-wrap { position: relative; flex: 1; }
  .search-wrap input { margin-bottom: 0; padding-left: 42px; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; }
  .filter-select { width: 160px; margin-bottom: 0; }

  /* Songs grid */
  .songs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
  .song-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px; transition: all .2s; cursor: pointer; position: relative;
  }
  .song-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.3); }
  .song-cover {
    width: 100%; aspect-ratio: 1; border-radius: 10px; margin-bottom: 14px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    display: flex; align-items: center; justify-content: center; font-size: 36px; overflow: hidden;
  }
  .song-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .song-meta { color: var(--muted); font-size: 12px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .song-actions { display: flex; gap: 6px; margin-top: 12px; }
  .add-btn { flex: 1; padding: 7px; background: rgba(124,106,247,.15); border: 1px solid rgba(124,106,247,.3);
             color: var(--accent); border-radius: 8px; cursor: pointer; font-size: 12px; font-family: 'DM Sans', sans-serif;
             font-weight: 600; transition: all .2s; }
  .add-btn:hover { background: var(--accent); color: #fff; }

  /* Detail modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
    backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
           padding: 32px; width: 480px; max-width: 95vw; position: relative; }
  .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none;
                 color: var(--muted); font-size: 22px; cursor: pointer; }
  .modal-close:hover { color: var(--text); }
  .modal-song-cover { width: 100%; aspect-ratio: 2/1; border-radius: 12px; margin-bottom: 20px;
                       background: linear-gradient(135deg, var(--accent), var(--accent2));
                       display: flex; align-items: center; justify-content: center; font-size: 56px; }
  .detail-row { display: flex; justify-content: space-between; padding: 10px 0;
                border-bottom: 1px solid var(--border); font-size: 14px; }
  .detail-row:last-of-type { border-bottom: none; }
  .detail-label { color: var(--muted); }
  .detail-value { font-weight: 500; text-align: right; }

  /* Playlists */
  .playlists-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .playlist-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px; transition: all .2s;
  }
  .playlist-card:hover { border-color: rgba(124,106,247,.5); }
  .playlist-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .playlist-name { font-weight: 600; font-size: 16px; }
  .playlist-desc { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
  .playlist-count { font-size: 12px; color: var(--muted); }
  .playlist-actions { display: flex; gap: 6px; margin-top: 14px; flex-wrap: wrap; }
  .new-playlist-btn {
    background: var(--card); border: 2px dashed var(--border); border-radius: 14px;
    padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; min-height: 140px; transition: all .2s; gap: 8px;
  }
  .new-playlist-btn:hover { border-color: var(--accent); color: var(--accent); }
  .new-playlist-btn .plus { font-size: 28px; }

  /* Playlist detail view */
  .back-btn { display: flex; align-items: center; gap: 8px; background: none; border: none;
              color: var(--muted); cursor: pointer; font-size: 14px; margin-bottom: 24px; padding: 0; }
  .back-btn:hover { color: var(--text); }
  .playlist-detail-header { display: flex; align-items: center; gap: 20px; margin-bottom: 32px; }
  .playlist-art { width: 100px; height: 100px; border-radius: 14px; flex-shrink: 0;
                  background: linear-gradient(135deg, var(--accent), var(--accent2));
                  display: flex; align-items: center; justify-content: center; font-size: 40px; }
  .player-controls { display: flex; gap: 10px; margin-top: 12px; }
  .ctrl-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
              background: var(--card); color: var(--text); cursor: pointer; font-size: 16px;
              transition: all .2s; }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn.active-ctrl { background: rgba(124,106,247,.2); border-color: var(--accent); color: var(--accent); }
  .playlist-songs-list { display: flex; flex-direction: column; gap: 8px; }
  .playlist-song-row {
    display: flex; align-items: center; gap: 14px; padding: 12px 16px;
    background: var(--card); border: 1px solid var(--border); border-radius: 10px; transition: all .2s;
  }
  .playlist-song-row:hover { border-color: rgba(124,106,247,.4); }
  .song-num { color: var(--muted); font-size: 13px; width: 24px; text-align: center; flex-shrink: 0; }
  .song-info { flex: 1; min-width: 0; }
  .song-info .title { font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .song-info .artist { color: var(--muted); font-size: 12px; }
  .remove-song-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; }
  .remove-song-btn:hover { color: var(--danger); }

  /* Toast */
  #toast { position: fixed; bottom: 28px; right: 28px; background: var(--card);
           border: 1px solid var(--border); border-radius: 12px; padding: 14px 20px;
           font-size: 14px; font-weight: 500; transform: translateY(80px); opacity: 0;
           transition: all .3s; z-index: 9999; max-width: 320px; }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-color: var(--success); color: var(--success); }
  #toast.error { border-color: var(--danger); color: var(--danger); }

  /* Spinner */
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border);
             border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Inline form box */
  .form-box { background: var(--card); border: 1px solid var(--border); border-radius: 14px;
              padding: 24px; margin-bottom: 28px; }
  .form-box .form-title { font-weight: 600; font-size: 15px; margin-bottom: 18px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-row .full { grid-column: 1 / -1; }

  /* Tag badge */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px;
           font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .badge-green { background: rgba(76,175,125,.15); color: var(--success); border: 1px solid rgba(76,175,125,.3); }
  .badge-red { background: rgba(240,96,96,.15); color: var(--danger); border: 1px solid rgba(240,96,96,.3); }

  /* Empty state */
  .empty { text-align: center; padding: 64px 0; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .songs-grid .song-card, .playlists-grid .playlist-card { animation: fadeIn .3s ease forwards; }
</style>
</head>
<body>

<!-- ─── Auth Screen ─────────────────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="brand">Rhythmix</div>
    <div class="brand-sub">Your Personal Music Universe</div>
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login -->
    <div id="login-form">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••">
      <div id="login-error" class="error-msg" style="display:none"></div>
      <button class="btn btn-primary" onclick="login()">Sign In →</button>
    </div>

    <!-- Register -->
    <div id="register-form" style="display:none">
      <label>Full Name</label>
      <input type="text" id="reg-name" placeholder="Your name">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="you@example.com">
      <label>Phone</label>
      <input type="text" id="reg-phone" placeholder="+91 9999999999">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="••••••••">
      <div id="reg-error" class="error-msg" style="display:none"></div>
      <button class="btn btn-primary" onclick="register()">Create Account →</button>
    </div>
  </div>
</div>

<!-- ─── Main App ─────────────────────────────────────────────── -->
<div id="app">
  <nav class="sidebar">
    <div class="sidebar-brand">Rhythmix</div>
    <button class="nav-item active" id="nav-songs" onclick="showPage('songs')">
      <span class="icon">🎵</span> All Songs
    </button>
    <button class="nav-item" id="nav-playlists" onclick="showPage('playlists')">
      <span class="icon">📋</span> My Playlists
    </button>
    <div class="nav-spacer"></div>
    <div class="user-chip">
      <div class="avatar" id="user-avatar">U</div>
      <div class="user-name" id="user-display">User</div>
      <button class="logout-btn" onclick="logout()" title="Logout">⏏</button>
    </div>
  </nav>

  <main class="main">
    <!-- Songs Page -->
    <div class="page active" id="page-songs">
      <div class="page-title">Library</div>
      <div class="page-sub">Browse and discover songs</div>
      <div class="search-row">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="song-search" placeholder="Search songs, artists, albums..." oninput="debouncedSearch()">
        </div>
        <select class="filter-select" id="search-filter" onchange="debouncedSearch()">
          <option value="all">All Fields</option>
          <option value="singer">By Singer</option>
          <option value="album">By Album</option>
          <option value="director">By Director</option>
        </select>
      </div>
      <div id="songs-grid" class="songs-grid"></div>
    </div>

    <!-- Playlists Page -->
    <div class="page" id="page-playlists">
      <div id="playlists-list-view">
        <div class="page-title">My Playlists</div>
        <div class="page-sub">Manage your music collections</div>
        <div id="playlists-grid" class="playlists-grid"></div>
      </div>
      <div id="playlist-detail-view" style="display:none">
        <!-- filled dynamically -->
      </div>
    </div>
  </main>
</div>

<!-- Song Detail Modal -->
<div class="modal-overlay" id="song-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('song-modal')">✕</button>
    <div class="modal-song-cover" id="modal-cover">🎵</div>
    <div id="modal-details"></div>
    <div style="margin-top:20px">
      <label style="margin-bottom:8px;display:block">Add to Playlist</label>
      <div style="display:flex;gap:8px">
        <select id="modal-playlist-select" style="flex:1;margin-bottom:0"></select>
        <button class="btn btn-primary btn-sm" onclick="addSongFromModal()">Add</button>
      </div>
    </div>
  </div>
</div>

<!-- New Playlist Modal -->
<div class="modal-overlay" id="playlist-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('playlist-modal')">✕</button>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;margin-bottom:24px" id="playlist-modal-title">New Playlist</div>
    <label>Playlist Name</label>
    <input type="text" id="playlist-name-input" placeholder="My Favourites">
    <label>Description</label>
    <input type="text" id="playlist-desc-input" placeholder="Optional description">
    <input type="hidden" id="playlist-edit-id">
    <button class="btn btn-primary" onclick="savePlaylist()">Save Playlist</button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
const API = 'http://localhost:8080'; // API Gateway
let token = null;
let currentUser = null;
let allSongs = [];
let currentSongId = null;
let currentPlaylistId = null;
let playerState = { playing: false, repeat: false, shuffle: false };
let searchTimer = null;

// ─── Auth ────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', (tab==='login') === (i===0)));
  document.getElementById('login-form').style.display = tab==='login' ? '' : 'none';
  document.getElementById('register-form').style.display = tab==='register' ? '' : 'none';
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  try {
    const res = await fetch(`${API}/api/auth/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'Invalid credentials');
    initApp(data);
  } catch (e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
  }
}

async function register() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const phoneNumber = document.getElementById('reg-phone').value.trim();
  const password = document.getElementById('reg-password').value;
  const errEl = document.getElementById('reg-error');
  errEl.style.display = 'none';
  try {
    const res = await fetch(`${API}/api/auth/register`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, phoneNumber, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || Object.values(data)[0] || 'Registration failed');
    initApp(data);
  } catch (e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
  }
}

function initApp(data) {
  token = data.token;
  currentUser = { name: data.name, email: data.email, role: data.role };
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-display').textContent = data.name;
  document.getElementById('user-avatar').textContent = data.name.charAt(0).toUpperCase();
  loadSongs();
  showPage('songs');
}

function logout() {
  token = null; currentUser = null; allSongs = [];
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-email').value = '';
  document.getElementById('login-password').value = '';
}

// ─── Navigation ──────────────────────────────────────────────────
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('nav-' + page).classList.add('active');
  if (page === 'playlists') loadPlaylists();
}

// ─── Songs ───────────────────────────────────────────────────────
async function loadSongs() {
  const grid = document.getElementById('songs-grid');
  grid.innerHTML = '<div class="spinner" style="margin:40px auto;display:block"></div>';
  try {
    const res = await authFetch('/api/songs');
    allSongs = await res.json();
    renderSongs(allSongs);
  } catch (e) { grid.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Could not load songs. Is the backend running?</div></div>'; }
}

function renderSongs(songs) {
  const grid = document.getElementById('songs-grid');
  if (!songs.length) { grid.innerHTML = '<div class="empty"><div class="empty-icon">🎵</div><div class="empty-text">No songs found</div></div>'; return; }
  grid.innerHTML = songs.map((s, i) => `
    <div class="song-card" style="animation-delay:${i*30}ms" onclick="openSongDetail(${s.id})">
      <div class="song-cover">${getEmoji(s.genre)}</div>
      <div class="song-title">${esc(s.title)}</div>
      <div class="song-meta">🎤 ${esc(s.singer || '—')}</div>
      <div class="song-meta">💿 ${esc(s.albumName || '—')}</div>
      <div class="song-actions">
        <button class="add-btn" onclick="event.stopPropagation();quickAddToPlaylist(${s.id})">+ Playlist</button>
      </div>
    </div>`).join('');
}

function debouncedSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(doSearch, 350);
}

async function doSearch() {
  const keyword = document.getElementById('song-search').value.trim();
  const filter = document.getElementById('search-filter').value;
  if (!keyword) { renderSongs(allSongs); return; }
  try {
    let url = filter === 'all' ? `/api/songs/search?keyword=${encodeURIComponent(keyword)}`
            : filter === 'singer' ? `/api/songs/search/singer?singer=${encodeURIComponent(keyword)}`
            : filter === 'album' ? `/api/songs/search/album?album=${encodeURIComponent(keyword)}`
            : `/api/songs/search/director?director=${encodeURIComponent(keyword)}`;
    const res = await authFetch(url);
    renderSongs(await res.json());
  } catch (e) { showToast('Search failed', 'error'); }
}

async function openSongDetail(id) {
  currentSongId = id;
  try {
    const res = await authFetch(`/api/songs/${id}`);
    const s = await res.json();
    document.getElementById('modal-cover').textContent = getEmoji(s.genre);
    document.getElementById('modal-details').innerHTML = `
      <div style="font-weight:700;font-size:20px;margin-bottom:4px">${esc(s.title)}</div>
      <div style="color:var(--muted);font-size:13px;margin-bottom:16px">${esc(s.singer || '')}</div>
      ${detailRow('Singer', s.singer)}
      ${detailRow('Music Director', s.musicDirector)}
      ${detailRow('Album', s.albumName)}
      ${detailRow('Genre', s.genre)}
      ${detailRow('Release Date', s.releaseDate)}
    `;
    // Load playlists into select
    const pRes = await authFetch('/api/playlists');
    const playlists = await pRes.json();
    const sel = document.getElementById('modal-playlist-select');
    sel.innerHTML = playlists.length
      ? playlists.map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join('')
      : '<option disabled>No playlists yet</option>';
    openModal('song-modal');
  } catch (e) { showToast('Could not load song details', 'error'); }
}

async function addSongFromModal() {
  const playlistId = document.getElementById('modal-playlist-select').value;
  if (!playlistId) { showToast('Create a playlist first', 'error'); return; }
  try {
    await authFetch(`/api/playlists/${playlistId}/songs/${currentSongId}`, 'POST');
    showToast('Song added to playlist ✓', 'success');
    closeModal('song-modal');
  } catch (e) { showToast('Failed to add song', 'error'); }
}

async function quickAddToPlaylist(songId) {
  currentSongId = songId;
  openSongDetail(songId);
}

// ─── Playlists ───────────────────────────────────────────────────
async function loadPlaylists() {
  document.getElementById('playlists-list-view').style.display = '';
  document.getElementById('playlist-detail-view').style.display = 'none';
  const grid = document.getElementById('playlists-grid');
  grid.innerHTML = '<div class="spinner" style="margin:40px auto;display:block"></div>';
  try {
    const res = await authFetch('/api/playlists');
    const playlists = await res.json();
    renderPlaylists(playlists);
  } catch (e) { grid.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Could not load playlists</div></div>'; }
}

function renderPlaylists(playlists) {
  const grid = document.getElementById('playlists-grid');
  grid.innerHTML = `
    <div class="new-playlist-btn" onclick="openNewPlaylistModal()">
      <div class="plus">＋</div>
      <div style="font-size:14px;font-weight:600">New Playlist</div>
    </div>
    ${playlists.map(p => `
      <div class="playlist-card">
        <div class="playlist-header">
          <div>
            <div class="playlist-name">${esc(p.name)}</div>
            <div class="playlist-count">${p.songCount} song${p.songCount !== 1 ? 's' : ''}</div>
          </div>
          <span style="font-size:24px">🎶</span>
        </div>
        <div class="playlist-desc">${esc(p.description || '')}</div>
        <div class="playlist-actions">
          <button class="btn btn-outline btn-sm" onclick="openPlaylistDetail(${p.id})">Open</button>
          <button class="btn btn-outline btn-sm" onclick="openEditPlaylistModal(${p.id},'${esc(p.name)}','${esc(p.description||'')}')">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deletePlaylist(${p.id})">Delete</button>
        </div>
      </div>`).join('')}`;
}

async function openPlaylistDetail(playlistId) {
  currentPlaylistId = playlistId;
  document.getElementById('playlists-list-view').style.display = 'none';
  const detail = document.getElementById('playlist-detail-view');
  detail.style.display = '';
  detail.innerHTML = '<div class="spinner" style="margin:60px auto;display:block"></div>';
  try {
    const res = await authFetch(`/api/playlists/${playlistId}`);
    const p = await res.json();
    playerState = { playing: false, repeat: false, shuffle: false };
    renderPlaylistDetail(p);
  } catch (e) { detail.innerHTML = '<div class="empty">Could not load playlist</div>'; }
}

function renderPlaylistDetail(p) {
  const detail = document.getElementById('playlist-detail-view');
  detail.innerHTML = `
    <button class="back-btn" onclick="loadPlaylists()">← Back to Playlists</button>
    <div class="playlist-detail-header">
      <div class="playlist-art">🎶</div>
      <div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px">${esc(p.name)}</div>
        <div style="color:var(--muted);font-size:13px;margin-bottom:8px">${p.songCount} songs${p.description ? ' · ' + esc(p.description) : ''}</div>
        <div class="player-controls">
          <button class="ctrl-btn ${playerState.playing?'active-ctrl':''}" onclick="togglePlay(this)" title="Play/Stop">▶</button>
          <button class="ctrl-btn ${playerState.repeat?'active-ctrl':''}" onclick="toggleRepeat(this)" title="Repeat">🔁</button>
          <button class="ctrl-btn ${playerState.shuffle?'active-ctrl':''}" onclick="toggleShuffle(this)" title="Shuffle">🔀</button>
        </div>
      </div>
    </div>
    <div style="margin-bottom:20px">
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:16px">
        <div style="font-weight:600;font-size:15px">Songs</div>
        <button class="btn btn-outline btn-sm" onclick="openAddSongToPlaylistModal()">+ Add Songs</button>
      </div>
      <div class="playlist-songs-list" id="playlist-songs-list">
        ${p.songs.length ? p.songs.map((s, i) => `
          <div class="playlist-song-row">
            <div class="song-num">${i+1}</div>
            <div class="song-cover" style="width:38px;height:38px;border-radius:8px;flex-shrink:0;font-size:18px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--accent),var(--accent2))">${getEmoji(s.genre)}</div>
            <div class="song-info">
              <div class="title">${esc(s.title)}</div>
              <div class="artist">${esc(s.singer || '—')}</div>
            </div>
            <button class="remove-song-btn" onclick="removeSongFromPlaylist(${p.id},${s.id})" title="Remove">✕</button>
          </div>`).join('') : '<div class="empty" style="padding:32px 0"><div class="empty-icon">🎵</div><div class="empty-text">No songs yet — add some!</div></div>'}
      </div>
    </div>`;
}

async function openAddSongToPlaylistModal() {
  // Reuse song detail modal as an add-to-playlist flow — open a mini search inline
  const songs = allSongs.length ? allSongs : await authFetch('/api/songs').then(r => r.json());
  const modal = document.getElementById('song-modal');
  document.getElementById('modal-cover').textContent = '🔍';
  document.getElementById('modal-details').innerHTML = `
    <div style="font-weight:700;font-size:18px;margin-bottom:14px">Add Song to Playlist</div>
    <input type="text" id="add-song-search" placeholder="Search songs..." oninput="filterAddList()" style="margin-bottom:12px">
    <div id="add-song-list" style="max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:6px">
      ${songs.map(s => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--card);border-radius:8px;border:1px solid var(--border)">
          <div><div style="font-size:13px;font-weight:500">${esc(s.title)}</div><div style="font-size:11px;color:var(--muted)">${esc(s.singer||'')}</div></div>
          <button class="add-btn btn-sm" style="width:auto;padding:5px 12px" onclick="addSongDirect(${s.id})">Add</button>
        </div>`).join('')}
    </div>`;
  document.querySelector('#song-modal [style*="margin-top:20px"]').style.display = 'none';
  openModal('song-modal');
}

window.filterAddList = function() {
  const q = document.getElementById('add-song-search').value.toLowerCase();
  document.querySelectorAll('#add-song-list > div').forEach(el => {
    el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
};

async function addSongDirect(songId) {
  try {
    await authFetch(`/api/playlists/${currentPlaylistId}/songs/${songId}`, 'POST');
    showToast('Song added ✓', 'success');
    closeModal('song-modal');
    document.querySelector('#song-modal [style*="margin-top:20px"]').style.display = '';
    openPlaylistDetail(currentPlaylistId);
  } catch (e) { showToast('Failed to add song', 'error'); }
}

async function removeSongFromPlaylist(playlistId, songId) {
  try {
    await authFetch(`/api/playlists/${playlistId}/songs/${songId}`, 'DELETE');
    showToast('Song removed', 'success');
    openPlaylistDetail(playlistId);
  } catch (e) { showToast('Failed to remove song', 'error'); }
}

async function deletePlaylist(id) {
  if (!confirm('Delete this playlist?')) return;
  try {
    await authFetch(`/api/playlists/${id}`, 'DELETE');
    showToast('Playlist deleted', 'success');
    loadPlaylists();
  } catch (e) { showToast('Failed to delete playlist', 'error'); }
}

function openNewPlaylistModal() {
  document.getElementById('playlist-modal-title').textContent = 'New Playlist';
  document.getElementById('playlist-name-input').value = '';
  document.getElementById('playlist-desc-input').value = '';
  document.getElementById('playlist-edit-id').value = '';
  openModal('playlist-modal');
}

function openEditPlaylistModal(id, name, desc) {
  document.getElementById('playlist-modal-title').textContent = 'Edit Playlist';
  document.getElementById('playlist-name-input').value = name;
  document.getElementById('playlist-desc-input').value = desc;
  document.getElementById('playlist-edit-id').value = id;
  openModal('playlist-modal');
}

async function savePlaylist() {
  const name = document.getElementById('playlist-name-input').value.trim();
  const description = document.getElementById('playlist-desc-input').value.trim();
  const editId = document.getElementById('playlist-edit-id').value;
  if (!name) { showToast('Name is required', 'error'); return; }
  try {
    if (editId) {
      await authFetch(`/api/playlists/${editId}`, 'PUT', { name, description });
      showToast('Playlist updated ✓', 'success');
    } else {
      await authFetch('/api/playlists', 'POST', { name, description });
      showToast('Playlist created ✓', 'success');
    }
    closeModal('playlist-modal');
    loadPlaylists();
  } catch (e) { showToast('Failed to save playlist', 'error'); }
}

// ─── Player Controls (UI only) ───────────────────────────────────
function togglePlay(btn) {
  playerState.playing = !playerState.playing;
  btn.textContent = playerState.playing ? '⏸' : '▶';
  btn.classList.toggle('active-ctrl', playerState.playing);
  showToast(playerState.playing ? 'Playing...' : 'Stopped', 'success');
}
function toggleRepeat(btn) {
  playerState.repeat = !playerState.repeat;
  btn.classList.toggle('active-ctrl', playerState.repeat);
}
function toggleShuffle(btn) {
  playerState.shuffle = !playerState.shuffle;
  btn.classList.toggle('active-ctrl', playerState.shuffle);
}

// ─── Helpers ─────────────────────────────────────────────────────
async function authFetch(path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (res.status === 401) { logout(); throw new Error('Session expired'); }
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || 'Request failed');
  }
  return res;
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function detailRow(label, value) {
  return value ? `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-value">${esc(String(value))}</span></div>` : '';
}

function getEmoji(genre) {
  const map = { Pop:'🎤', Rock:'🎸', Jazz:'🎷', Classical:'🎻', Hip_Hop:'🎧', EDM:'🎛️', Country:'🤠', R_B:'🎙️', Metal:'⚡', Bollywood:'🌸' };
  return map[genre] || '🎵';
}

function esc(str) { return str ? String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

let toastTimer = null;
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = '', 3000);
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) {
      overlay.classList.remove('open');
      const hidden = overlay.querySelector('[style*="margin-top:20px"]');
      if (hidden) hidden.style.display = '';
    }
  });
});
</script>
</body>
